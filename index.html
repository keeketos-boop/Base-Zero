<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Zero | Smart Base</title>
    <style>
        body { margin: 0; background: #000; color: #00e5ff; font-family: monospace; overflow: hidden; }
        #arena { position: absolute; width: 100vw; height: 100vh; background: radial-gradient(#111 1px, transparent 1px); background-size: 30px 30px; }
        #header { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 10px; display: flex; justify-content: space-between; border-bottom: 2px solid #00e5ff; z-index: 100; }
        /* نظام البناء التلقائي */
        .node { position: absolute; border: 1px solid #00e5ff; padding: 5px; font-size: 9px; background: rgba(0,229,255,0.1); animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
        /* مركز الشحن */
        #hub { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; background: #050505; border: 2px solid #ff00ea; border-radius: 15px; padding: 15px; text-align: center; box-shadow: 0 0 20px #ff00ea; z-index: 1000; }
        .btn { display: block; background: #ff00ea; color: #fff; padding: 12px; margin: 8px 0; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>
    <div id="header">
        <span>💰 محفظة نشطة</span>
        <span style="letter-spacing: 2px;">BASE ZERO</span>
        <span>⏳ <span id="timer">0</span>s</span>
    </div>
    <div id="arena"></div>
    <div id="hub">
        <h3 style="margin:0 0 10px 0;">⚡ مركز الشحن والإيداع</h3>
        <a href="https://wa.me/qr/OVGQUJIEFAP4F1" class="btn">إيداع رصيد (ليبيانا/مدار)</a>
        <a href="https://wa.me/qr/OVGQUJIEFAP4F1" class="btn" style="background:#f3ba2f; color:#000;">إيداع USDT / كريبتو</a>
    </div>
    <script>
        const arena = document.getElementById('arena');
        function build() {
            const n = document.createElement('div');
            n.className = 'node';
            n.style.left = Math.random() * 80 + '%';
            n.style.top = Math.random() * 70 + 10 + '%';
            n.innerHTML = "SYSTEM_NODE_" + Math.floor(Math.random()*999) + "<br>RUNNING...";
            arena.appendChild(n);
            if(arena.childElementCount > 15) arena.removeChild(arena.firstChild);
        }
        setInterval(build, 3000); // بناء نود جديدة كل 3 ثواني
        let s = 0; setInterval(() => { s++; document.getElementById('timer').innerText = s; }, 1000);
    </script>
</body>
</html>
