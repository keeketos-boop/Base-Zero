<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Zero | Autonomous Construction</title>
    <style>
        body { margin: 0; background: #000; color: #00e5ff; font-family: 'Courier New', monospace; overflow: hidden; }
        #arena { position: fixed; width: 100vw; height: 100vh; z-index: -1; background: #000; }
        
        /* شريط النظام العلوي */
        #system-status { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 10px 20px; border-bottom: 1px solid #00e5ff; display: flex; justify-content: space-between; z-index: 1000; box-sizing: border-box; font-size: 14px; }

        /* وحدات البناء الذكي (الذكاء الاصطناعي) */
        .ai-structure { position: absolute; border: 1px solid #00e5ff; background: rgba(0, 229, 255, 0.02); transition: all 2s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: inset 0 0 20px rgba(0,229,255,0.1); }
        .ai-label { font-size: 9px; margin-top: 5px; opacity: 0.7; }

        /* النوافذ المنبثقة المستقلة */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; }
        .modal-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 350px; border: 2px solid #00e5ff; background: #050505; padding: 25px; text-align: center; box-shadow: 0 0 50px rgba(0,229,255,0.3); }
        
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #00e5ff; color: #00e5ff; border-radius: 0; outline: none; }
        .action-btn { width: 100%; padding: 15px; margin: 10px 0; background: transparent; border: 1px solid #00e5ff; color: #00e5ff; cursor: pointer; font-weight: bold; font-family: inherit; }
        .action-btn:hover { background: #00e5ff; color: #000; }

        /* التحكم السفلي */
        #core-controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 1000; }
    </style>
</head>
<body>

    <div id="system-status">
        <div onclick="openModal('login-m')" style="cursor:pointer">[ ACCESS_LOGIN ]</div>
        <div style="letter-spacing: 5px; font-weight: bold;">BASE ZERO</div>
        <div>Uptime: <span id="clock">0</span>s</div>
    </div>

    <div id="arena"></div>

    <div id="core-controls">
        <button class="action-btn" style="width:120px" onclick="openModal('dep-m')">إيداع</button>
        <button class="action-btn" style="width:120px; border-color:#ff00ea; color:#ff00ea" onclick="openModal('with-m')">سحب</button>
    </div>

    <div id="login-m" class="modal-overlay">
        <div class="modal-box">
            <h3>SECURE_LOGIN</h3>
            <input type="text" placeholder="USER_ID">
            <input type="password" placeholder="PASS_KEY">
            <button class="action-btn" onclick="closeModal()">INITIATE_SESSION</button>
            <p onclick="closeModal()" style="color:red; cursor:pointer; font-size:12px;">[ CLOSE ]</p>
        </div>
    </div>

    <div id="dep-m" class="modal-overlay">
        <div class="modal-box">
            <h3>DEPOSIT_SYSTEM</h3>
            <p style="font-size:12px;">النظام جاهز لاستلام القيمة داخلياً:</p>
            <input type="text" placeholder="DESTINATION_WALLET">
            <input type="number" placeholder="AMOUNT">
            <button class="action-btn" onclick="closeModal()">CONFIRM_DEPOSIT</button>
            <p onclick="closeModal()" style="color:red; cursor:pointer; font-size:12px;">[ CLOSE ]</p>
        </div>
    </div>

    <div id="with-m" class="modal-overlay">
        <div class="modal-box" style="border-color:#ff00ea">
            <h3 style="color:#ff00ea;">WITHDRAW_SYSTEM</h3>
            <input type="number" placeholder="WITHDRAW_AMOUNT">
            <button class="action-btn" style="border-color:#ff00ea; color:#ff00ea" onclick="closeModal()">EXECUTE_PAYOUT</button>
            <p onclick="closeModal()" style="color:red; cursor:pointer; font-size:12px;">[ CLOSE ]</p>
        </div>
    </div>

    <script>
        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }

        // منطق "البناء الذاتي" (Self-Building Logic)
        const arena = document.getElementById('arena');
        function autoBuild() {
            const structure = document.createElement('div');
            structure.className = 'ai-structure';
            
            // أحجام ومواقع عشوائية ذكية
            let w = Math.random() * 150 + 100;
            let h = w * 0.6;
            structure.style.width = w + 'px';
            structure.style.height = h + 'px';
            structure.style.left = Math.random() * (window.innerWidth - 200) + 'px';
            structure.style.top = Math.random() * (window.innerHeight - 200) + 'px';
            
            structure.innerHTML = `<span style="font-size:10px">BUILDING...</span>`;
            arena.appendChild(structure);

            // تحول الوحدة بعد البناء
            setTimeout(() => {
                structure.style.borderColor = (Math.random() > 0.5) ? "#00e5ff" : "#ff00ea";
                structure.innerHTML = `
                    <span style="font-size:11px">NODE_${Math.floor(Math.random()*1000)}</span>
                    <span class="ai-label">STABILITY: ${Math.floor(Math.random()*100)}%</span>
                `;
            }, 2000);

            // الحفاظ على أداء المتصفح (مسح الوحدات القديمة)
            if(arena.childElementCount > 12) {
                arena.removeChild(arena.firstChild);
            }
        }

        // تشغيل دورة البناء والعداد
        setInterval(autoBuild, 4000);
        let s = 0; setInterval(() => { s++; document.getElementById('clock').innerText = s; }, 1000);
        
        // بناء أولي
        for(let i=0; i<4; i++) autoBuild();
    </script>
</body>
</html>
