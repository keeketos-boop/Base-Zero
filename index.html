<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Zero | الذكاء السيبراني</title>
    <style>
        body { margin: 0; background: #000; color: #00e5ff; font-family: 'Courier New', monospace; overflow: hidden; }
        #arena { position: fixed; width: 10000px; height: 10000px; z-index: -1; background: radial-gradient(#111 1px, transparent 1px); background-size: 50px 50px; }
        #header-ui { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 12px; display: flex; justify-content: space-between; border-bottom: 2px solid #00e5ff; z-index: 1000; }
        
        /* تصميم النوافذ المنبثقة (Popups) */
        .popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 400px; background: #050505; border: 2px solid #00e5ff; padding: 25px; z-index: 3000; box-shadow: 0 0 40px #00e5ff; border-radius: 5px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #00e5ff; color: #00e5ff; border-radius: 0; outline: none; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #00e5ff; color: #000; font-weight: bold; border: none; cursor: pointer; text-decoration: none; }
        
        /* ذكاء البناء (الخطوط والنمو) */
        .building { position: absolute; border: 1px solid #00e5ff; background: rgba(0, 229, 255, 0.03); transition: all 1.5s ease; display: flex; align-items: center; justify-content: center; font-size: 11px; box-shadow: inset 0 0 15px rgba(0,229,255,0.1); }
        .status-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); font-size: 10px; padding: 5px; border-top: 1px solid #333; z-index: 1000; }
    </style>
</head>
<body>

    <div id="header-ui">
        <div onclick="showPopup('login-popup')" style="cursor:pointer; border:1px solid #00e5ff; padding:2px 10px;">👤 LOGIN</div>
        <div style="font-weight: bold; letter-spacing: 5px;">BASE ZERO</div>
        <div>⏳ <span id="age">0</span>s</div>
    </div>

    <div id="arena"></div>

    <div style="position:fixed; bottom:40px; width:100%; display:flex; justify-content:center; gap:20px; z-index:1000;">
        <button class="btn" style="width:120px;" onclick="showPopup('deposit-popup')">📥 إيداع</button>
        <button class="btn" style="width:120px; background:#ff00ea;" onclick="showPopup('withdraw-popup')">📤 سحب</button>
    </div>

    <div id="login-popup" class="popup">
        <h3 style="letter-spacing: 2px;">ACCESS_CORE</h3>
        <input type="text" placeholder="ID_USER">
        <input type="password" placeholder="PASS_CODE">
        <button class="btn" onclick="closePopups()">INITIALIZE</button>
        <button onclick="closePopups()" style="color:red; background:none; border:none; cursor:pointer;">[CLOSE]</button>
    </div>

    <div id="deposit-popup" class="popup">
        <h3>مركز الإيداع</h3>
        <a href="https://wa.me/qr/OVGQUJIEFAP4F1" class="btn">رصيد مدار / ليبيانا</a>
        <a href="https://wa.me/qr/OVGQUJIEFAP4F1" class="btn" style="background:#f3ba2f;">CRYPTO / USDT</a>
        <button onclick="closePopups()" style="color:red; background:none; border:none; cursor:pointer;">[CLOSE]</button>
    </div>

    <div id="withdraw-popup" class="popup" style="border-color:#ff00ea; box-shadow: 0 0 40px #ff00ea;">
        <h3 style="color:#ff00ea;">مركز السحب</h3>
        <input type="number" placeholder="AMOUNT">
        <a href="https://wa.me/qr/OVGQUJIEFAP4F1" class="btn" style="background:#ff00ea; color:#fff;">CONFIRM WITHDRAW</a>
        <button onclick="closePopups()" style="color:red; background:none; border:none; cursor:pointer;">[CLOSE]</button>
    </div>

    <div class="status-bar">SYSTEM_STATUS: ACTIVE | AI_LOGIC: RUNNING | ENCRYPTION: 256-BIT</div>

    <script>
        // منطق النوافذ
        function showPopup(id) { closePopups(); document.getElementById(id).style.display = 'block'; }
        function closePopups() { document.querySelectorAll('.popup').forEach(p => p.style.display = 'none'); }

        // منطق الذكاء (بناء القاعدة التلقائي)
        const arena = document.getElementById('arena');
        function buildBase() {
            const b = document.createElement('div');
            b.className = 'building';
            let size = Math.random() * 150 + 80;
            b.style.width = size + 'px';
            b.style.height = (size/1.5) + 'px';
            b.style.left = Math.random() * (window.innerWidth - 200) + 'px';
            b.style.top = Math.random() * (window.innerHeight - 200) + 'px';
            b.innerHTML = "LOADING_DATA...";
            arena.appendChild(b);
            
            setTimeout(() => {
                b.innerHTML = "LAB_UNIT_" + Math.floor(Math.random()*9999);
                b.style.borderColor = (Math.random() > 0.5) ? "#00e5ff" : "#ff00ea";
            }, 2000);

            if(arena.childElementCount > 12) arena.removeChild(arena.firstChild);
        }

        setInterval(buildBase, 4000);
        let s = 0; setInterval(() => { s++; document.getElementById('age').innerText = s; }, 1000);
    </script>
</body>
</html>
