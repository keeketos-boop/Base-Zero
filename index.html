<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Zero | Real-Time Engine</title>
    <style>
        :root { --main: #00e5ff; --pink: #ff00ea; --gold: #ffff00; --green: #00ff44; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* نظام الصفحات الحقيقي */
        .page-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 2000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }

        #arena { position: fixed; width: 100vw; height: 100vh; z-index: -1; background-image: radial-gradient(rgba(0, 229, 255, 0.05) 1px, transparent 1px); background-size: 40px 40px; }
        
        .building { position: absolute; border: 1px solid var(--main); background: rgba(0,0,0,0.8); padding: 8px; border-radius: 6px; text-align: center; z-index: 10; }
        .citizen { position: absolute; width: 6px; height: 6px; background: #fff; border-radius: 50%; box-shadow: 0 0 12px #fff; transition: all 3s ease-in-out; z-index: 20; }
        .thought { position: absolute; top: -25px; right: 0; font-size: 10px; color: var(--green); white-space: nowrap; background: rgba(0,0,0,0.85); padding: 2px 8px; border-right: 2px solid var(--green); }

        #nav { position: fixed; top: 0; width: 100%; padding: 12px; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--main); display: flex; justify-content: space-between; z-index: 1000; box-sizing: border-box; }
        #dock { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 1000; }
        .btn { padding: 12px 25px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.9); box-shadow: 0 0 15px var(--main); }
    </style>
</head>
<body>

    <div id="screen-login" class="page-overlay"><h2>👤 دخول النظام</h2><button onclick="ui('close')" class="btn" style="background:var(--main)">خروج</button></div>
    <div id="screen-deposit" class="page-overlay"><h2>💰 لوحة الإيداع</h2><button onclick="ui('close')" class="btn" style="background:var(--main)">خروج</button></div>
    <div id="screen-games" class="page-overlay"><h2>🎮 مركز الألعاب</h2><button onclick="ui('close')" class="btn" style="background:var(--main)">خروج</button></div>
    <div id="screen-withdraw" class="page-overlay"><h2>💸 لوحة السحب</h2><button onclick="ui('close')" class="btn" style="background:var(--main)">خروج</button></div>

    <div id="nav">
        <div onclick="ui('screen-login')" style="color:var(--main); cursor:pointer; font-weight:bold;">[ دخول النظام ]</div>
        <div style="letter-spacing:3px; font-weight:900;">BASE ZERO</div>
        <div id="ai-log" style="font-size:10px; color:var(--green);">ENGINE: READY</div>
    </div>

    <div id="arena"></div>

    <div id="dock">
        <button class="btn" onclick="ui('screen-deposit')" style="background:var(--main); color:#000;">إيداع</button>
        <button class="btn" onclick="ui('screen-games')" style="background:var(--gold); color:#000;">ألعاب</button>
        <button class="btn" onclick="ui('screen-withdraw')" style="background:var(--pink); color:#fff;">سحب</button>
    </div>

    <script>
        // 1. نظام الأزرار التفاعلي (مش فيديو!)
        function ui(action) {
            document.querySelectorAll('.page-overlay').forEach(p => p.style.display = 'none');
            if(action !== 'close') document.getElementById(action).style.display = 'flex';
        }

        const arena = document.getElementById('arena');
        const fNames = ["محمد", "أحمد", "سارة", "علي", "نور"];
        const lNames = ["الزيرو", "الخبير", "المدار", "تيك", "ستار"];
        const buildTasks = ["بناء متجر", "تأسيس سكن", "تطوير مختبر", "شق شارع"];

        // 2. محرك الذكاء الحركي
        function spawnAI() {
            const c = document.createElement('div');
            c.className = 'citizen';
            const name = fNames[Math.floor(Math.random()*5)] + " " + lNames[Math.floor(Math.random()*5)];
            c.style.left = Math.random() * 80 + 'vw';
            c.style.top = Math.random() * 70 + 15 + 'vh';
            c.innerHTML = `<div class="thought">${name}: فحص الساحة...</div>`;
            arena.appendChild(c);

            setInterval(() => {
                // النقطة تمشي لمكان جديد "فعلاً"
                const x = Math.random() * 85 + 'vw';
                const y = Math.random() * 75 + 15 + 'vh';
                c.style.left = x;
                c.style.top = y;

                setTimeout(() => {
                    const task = buildTasks[Math.floor(Math.random()*4)];
                    c.querySelector('.thought').innerHTML = `${name}: ${task}!`;
                    
                    // بناء الوحدة في مكان النقطة
                    drawUnit(x, y, task);
                }, 3000);
            }, 8000);
        }

        function drawUnit(x, y, label) {
            const b = document.createElement('div');
            b.className = 'building';
            b.style.left = x; b.style.top = y;
            const color = ["#00e5ff", "#00ff44", "#ffff00", "#ff00ea"][Math.floor(Math.random()*4)];
            b.style.borderColor = color;
            b.innerHTML = `<span style="color:${color}; font-size:11px; font-weight:bold;">${label}</span><div style="font-size:8px; background:${color}; color:#000; padding:1px 4px; border-radius:10px; margin-top:4px;">ID_${Math.floor(Math.random()*999)}</div>`;
            arena.appendChild(b);

            if(arena.getElementsByClassName('building').length > 10) arena.removeChild(arena.getElementsByClassName('building')[0]);
        }

        // تشغيل المحرك
        for(let i=0; i<4; i++) spawnAI();
    </script>
</body>
</html>
