<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Zero | AI Minds</title>
    <style>
        :root { --main: #00e5ff; --text: #00ff44; --warn: #ffff00; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        #arena { position: fixed; width: 100vw; height: 100vh; z-index: -1; }

        /* ستايل المربعات (المباني الذكية) */
        .building { 
            position: absolute; border: 1px solid var(--main); background: rgba(0,229,255,0.05); 
            padding: 8px; border-radius: 4px; display: flex; flex-direction: column; 
            box-shadow: 0 0 10px rgba(0,229,255,0.2); transition: 1.5s;
        }
        .b-header { font-size: 12px; font-weight: bold; color: var(--main); border-bottom: 1px solid #222; margin-bottom: 5px; }
        .b-status { font-size: 9px; color: #888; }

        /* ستايل المواطنين (النقاط المفكرة) */
        .citizen {
            position: absolute; width: 4px; height: 4px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 8px #fff; transition: all 4s ease-in-out; z-index: 100;
        }
        .thought-bubble { 
            position: absolute; top: -25px; left: 10px; font-size: 9px; 
            white-space: nowrap; color: var(--text); background: rgba(0,0,0,0.7);
            padding: 2px 5px; border-left: 2px solid var(--text);
        }
    </style>
</head>
<body>

    <div style="position:fixed; top:0; width:100%; padding:10px; background:rgba(0,0,0,0.9); border-bottom:1px solid var(--main); z-index:1000; display:flex; justify-content:space-between; font-size:12px;">
        <div>SYSTEM: <span id="nodes-count">0</span> UNITS ACTIVE</div>
        <div style="letter-spacing:3px;">BASE ZERO GENESIS</div>
        <div id="ai-load">AI PROCESSING...</div>
    </div>

    <div id="arena"></div>

    <script>
        const arena = document.getElementById('arena');
        
        // بيانات التوليد الذكي (AI Logic Pools)
        const Names = ["أحمد", "عمر", "سالم", "فرج", "نور", "إياد", "مريم", "هناء"];
        const Thoughts = ["جاري جمع المكتسبات...", "ذاهب للمحل التقني", "أفكر في تطوير المنظومة", "أبحث عن مركز ألعاب", "تحليل بيانات القاعدة", "تحديث كود الدخول"];
        const Places = ["محل المدار", "مختبر لودو", "مركز زيرو", "شركة الإنماء", "سكن رقمي"];

        function generateNode() {
            const b = document.createElement('div');
            const place = Places[Math.floor(Math.random()*Places.length)];
            b.className = 'building';
            b.style.left = Math.random() * 80 + 'vw';
            b.style.top = Math.random() * 80 + 10 + 'vh';
            
            b.innerHTML = `
                <span class="b-header">${place}</span>
                <span class="b-status">حالة الوحدة: نشطة</span>
            `;
            
            arena.appendChild(b);
            if(arena.getElementsByClassName('building').length > 8) arena.removeChild(arena.getElementsByClassName('building')[0]);
            document.getElementById('nodes-count').innerText = arena.getElementsByClassName('building').length;
        }

        function generateCitizen() {
            const c = document.createElement('div');
            const name = Names[Math.floor(Math.random()*Names.length)];
            const thought = Thoughts[Math.floor(Math.random()*Thoughts.length)];
            
            c.className = 'citizen';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.top = Math.random() * 100 + 'vh';
            c.innerHTML = `<div class="thought-bubble"><b>${name}:</b> ${thought}</div>`;
            
            arena.appendChild(c);

            // ذكاء الحركة والتفكير المتغير
            setInterval(() => {
                c.style.left = Math.random() * 95 + 'vw';
                c.style.top = Math.random() * 95 + 'vh';
                // تحديث التفكير
                c.querySelector('.thought-bubble').innerHTML = `<b>${name}:</b> ${Thoughts[Math.floor(Math.random()*Thoughts.length)]}`;
            }, 5000);

            if(arena.getElementsByClassName('citizen').length > 6) arena.removeChild(arena.getElementsByClassName('citizen')[0]);
        }

        // تشغيل التوليد التلقائي
        setInterval(generateNode, 6000);
        setInterval(generateCitizen, 8000);

        // البدء فوراً
        for(let i=0; i<4; i++) { generateNode(); generateCitizen(); }
    </script>
</body>
</html>
